<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Split</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="home-btn" class="home-btn" hidden>&larr; Menu</button>
      <h1 class="logo">Word&nbsp;Split</h1>
      <div class="date" id="date-label"></div>
    </header>

    <!-- MENU ------------------------------------------------------------- -->
    <section id="view-menu" class="view">
      <p class="tagline">Two word puzzles. A fresh set every day.</p>
      <div class="menu-cards">
        <button class="mode-card" data-mode="combos">
          <span class="mode-title">Combos</span>
          <span class="mode-frame">cr<span class="blank">__</span>k</span>
          <span class="mode-desc">Find every two-letter fill that makes a word.</span>
          <span class="mode-status" id="status-combos"></span>
        </button>
        <button class="mode-card" data-mode="forks">
          <span class="mode-title">Forks</span>
          <span class="mode-split"><span class="stack"><span>EE</span><span>OO</span></span></span>
          <span class="mode-desc">Given the split, find the one shared word.</span>
          <span class="mode-status" id="status-forks"></span>
        </button>
      </div>
    </section>

    <!-- GAME ------------------------------------------------------------- -->
    <section id="view-game" class="view" hidden>
      <div class="gamebar">
        <span class="progress-pill" id="progress-pill">Puzzle 1 of 3</span>
        <span class="countdown" id="countdown">1:30</span>
      </div>
      <p class="rules" id="rules-text"></p>
      <div id="puzzles" class="puzzles"></div>
      <button id="skip-btn" class="ghost-btn">Skip puzzle</button>
    </section>

    <!-- RESULTS ---------------------------------------------------------- -->
    <section id="view-results" class="view" hidden>
      <h2 id="results-title">Done!</h2>
      <div class="final-score" id="final-score">0</div>
      <div class="final-score-label">points</div>
      <ul class="result-rows" id="result-rows"></ul>
      <div id="reveal-block" class="reveal-block"></div>
      <div class="result-actions">
        <button id="copy-btn" class="primary-btn">Copy results</button>
        <button id="results-menu-btn" class="ghost-btn">Back to menu</button>
      </div>
      <p class="copied-toast" id="copied-toast" hidden>Copied to clipboard!</p>
    </section>
  </main>

  <script src="dictionary.js"></script>
  <script src="puzzles.js"></script>
  <script src="app.js"></script>
</body>
</html>
